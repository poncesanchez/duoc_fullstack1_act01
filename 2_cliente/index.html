<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cliente REST · Mascotas</title>

    <!-- Tailwind via CDN (modo play) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>

    <!-- React y ReactDOM via CDN -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.development.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"
    ></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-50">
    <div id="root" class="min-h-screen flex items-center justify-center"></div>

    <script type="text/babel">
      const { useState } = React;

      function App() {
        const [url, setUrl] = useState("");
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const [data, setData] = useState(null);

        const handleFetch = async () => {
          setError("");
          setData(null);

          if (!url.trim()) {
            setError("Ingrese una URL válida.");
            return;
          }

          try {
            setLoading(true);
            const res = await fetch(url.trim());
            if (!res.ok) {
              throw new Error(`Error HTTP ${res.status}`);
            }
            const json = await res.json();
            setData(json);
          } catch (err) {
            setError(err.message || "Error al realizar la petición.");
          } finally {
            setLoading(false);
          }
        };

        const normalizeData = (raw) => {
          if (!raw) return [];
          if (Array.isArray(raw)) return raw;
          return [raw];
        };

        const pets = normalizeData(data);

        return (
          <div className="w-full max-w-5xl px-4 py-10">
            <div className="space-y-8">
              <section className="space-y-4">
                <div className="flex flex-col gap-3 sm:flex-row sm:items-center">
                  <label className="flex-1 text-sm text-slate-200">
                    URL del servicio (GET)
                    <input
                      type="text"
                      className="mt-1 w-full rounded-md border border-slate-700 bg-slate-900 px-3 py-2 text-sm text-slate-50 shadow-sm focus:border-cyan-400 focus:outline-none focus:ring-1 focus:ring-cyan-400"
                      placeholder="https://ejemplo.com/api/mascota"
                      value={url}
                      onChange={(e) => setUrl(e.target.value)}
                    />
                  </label>

                  <button
                    type="button"
                    onClick={handleFetch}
                    className="mt-2 inline-flex items-center justify-center rounded-md bg-cyan-400 px-4 py-2 text-sm font-semibold text-slate-900 shadow-sm transition hover:bg-cyan-300 focus:outline-none focus:ring-2 focus:ring-cyan-400 focus:ring-offset-2 focus:ring-offset-slate-950 sm:mt-6 sm:w-40"
                    disabled={loading}
                  >
                    {loading ? "Cargando..." : "Consultar"}
                  </button>
                </div>

                {error && (
                  <p className="text-sm text-red-400" role="alert">
                    {error}
                  </p>
                )}
              </section>

              <section className="space-y-3">
                <h2 className="text-sm font-semibold uppercase tracking-wide text-slate-300">
                  Resultado
                </h2>

                {!data && !loading && !error && (
                  <p className="text-sm text-slate-400">
                    Realiza una petición para ver los datos de las mascotas.
                  </p>
                )}

                {data && (
                  <div className="overflow-x-auto rounded-md border border-slate-800 bg-slate-900/70">
                    <table className="min-w-full text-left text-sm">
                      <thead className="bg-slate-900/80">
                        <tr>
                          <th className="px-4 py-3 font-medium text-slate-300">
                            ID
                          </th>
                          <th className="px-4 py-3 font-medium text-slate-300">
                            Nombre
                          </th>
                          <th className="px-4 py-3 font-medium text-slate-300">
                            Edad
                          </th>
                          <th className="px-4 py-3 font-medium text-slate-300">
                            Imagen
                          </th>
                          <th className="px-4 py-3 font-medium text-slate-300">
                            Descripción
                          </th>
                          <th className="px-4 py-3 font-medium text-slate-300">
                            Ciudad
                          </th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-800">
                        {pets.map((pet, idx) => (
                          <tr
                            key={pet.id ?? idx}
                            className="hover:bg-slate-800/60"
                          >
                            <td className="px-4 py-3 text-slate-200">
                              {pet.id ?? "—"}
                            </td>
                            <td className="px-4 py-3 text-slate-200">
                              {pet.nombre ?? "—"}
                            </td>
                            <td className="px-4 py-3 text-slate-200">
                              {pet.edad ?? "—"}
                            </td>
                            <td className="px-4 py-3">
                              {pet.url_imagen ? (
                                <img
                                  src={pet.url_imagen}
                                  alt={pet.nombre || "Mascota"}
                                  className="h-14 w-14 rounded-md border border-slate-700 object-cover"
                                />
                              ) : (
                                <span className="text-slate-500">
                                  Sin imagen
                                </span>
                              )}
                            </td>
                            <td className="px-4 py-3 text-slate-300">
                              {pet.descripcion ?? "—"}
                            </td>
                            <td className="px-4 py-3 text-slate-200">
                              {pet.ciudad ?? "—"}
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                )}
              </section>

              {data && (
                <section className="space-y-2">
                  <h3 className="text-xs font-semibold uppercase tracking-wide text-slate-400">
                    Respuesta cruda (JSON)
                  </h3>
                  <pre className="max-h-64 overflow-auto rounded-md bg-slate-900/80 p-3 text-xs text-slate-200">
                    {JSON.stringify(data, null, 2)}
                  </pre>
                </section>
              )}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById("root"));
      root.render(<App />);
    </script>
  </body>
</html>
